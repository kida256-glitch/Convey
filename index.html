    <title>Convey Marketplace</title>
    <script>
      window.global = window;
      // Prevent libraries from attempting to overwrite window.fetch
      if (!window.fetch) {
         // If fetch doesn't exist, we let them polyfill (unlikely in modern browsers)
      } else {
         // If it exists, we might want to protect it or ensure global.fetch is set
         window.global.fetch = window.fetch;
      }
    </script>
